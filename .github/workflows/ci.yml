name: CI — Devflow Harness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gates (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Mandatory Gates (BLOCKING) ──

      - name: TypeScript type check
        id: typecheck
        run: npm run typecheck

      - name: Unit tests
        id: tests
        run: npm test

      - name: Coverage (≥80%)
        id: coverage
        run: npm run test:coverage

      - name: Build
        id: build
        run: npm run build

      # ── Advisory Gates (non-blocking — tools optional) ──

      - name: ESLint (constitution rules — advisory)
        id: lint
        run: |
          if [ -f src/kernel/artifacts/tool-configs/eslintrc.constitution.json ]; then
            npx eslint src/ --max-warnings 0 --config src/kernel/artifacts/tool-configs/eslintrc.constitution.json 2>&1 || true
          else
            echo "ESLint config not found — skipping"
          fi
        continue-on-error: true

      - name: Circular dependency check (advisory)
        id: circular
        run: |
          npx madge --circular --extensions ts src/ 2>&1 || true
        continue-on-error: true

      - name: Forbidden dependency check (advisory)
        id: forbidden
        run: |
          if [ -f src/kernel/artifacts/tool-configs/dependency-cruiser.constitution.js ]; then
            npx dependency-cruiser --config src/kernel/artifacts/tool-configs/dependency-cruiser.constitution.js src/ 2>&1 || true
          else
            echo "dependency-cruiser config not found — skipping"
          fi
        continue-on-error: true

      - name: TODO/FIXME audit (advisory)
        id: todos
        run: |
          UNLINKED=$(grep -rn "TODO\|FIXME" src/ --include="*.ts" | grep -v "TODO(#" | grep -v "FIXME(#" || true)
          if [ -n "$UNLINKED" ]; then
            echo "⚠️  Unlinked TODO/FIXME found:"
            echo "$UNLINKED"
          else
            echo "✅ All TODO/FIXME have ticket references"
          fi
        continue-on-error: true

      - name: Adversarial test suite (advisory)
        id: adversarial
        run: |
          if [ -d test/adversarial/ ]; then
            npx vitest run test/adversarial/ --reporter=verbose 2>&1 || true
          else
            echo "No adversarial tests found — skipping"
          fi
        continue-on-error: true

      - name: Devflow self-check
        id: selfcheck
        run: |
          echo "Devflow status check..."
          node dist/main.js status --json 2>&1 || echo "Devflow self-check skipped"

      - name: Package audit (advisory)
        run: npm audit --audit-level=high 2>&1 || true
        continue-on-error: true

      # ── Summary ──

      - name: CI Summary
        if: always()
        run: |
          echo "## CI Results — Node ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ steps.typecheck.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ steps.coverage.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.build.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint (advisory) | ${{ steps.lint.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Circular Deps (advisory) | ${{ steps.circular.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Forbidden Deps (advisory) | ${{ steps.forbidden.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TODO/FIXME (advisory) | ${{ steps.todos.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Adversarial (advisory) | ${{ steps.adversarial.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mandatory gates:** TypeScript type check, unit tests, coverage ≥80%, build." >> $GITHUB_STEP_SUMMARY
          echo "**Advisory gates:** ESLint, circular deps, forbidden deps, TODO/FIXME, adversarial tests, package audit." >> $GITHUB_STEP_SUMMARY
