name: CI — Devflow Harness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gates (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Mandatory Gates (BLOCKING — use only tools in devDependencies) ──

      - name: TypeScript type check
        id: typecheck
        run: npm run typecheck

      - name: Unit tests
        id: tests
        run: npm test

      - name: Coverage
        id: coverage
        run: npm run test:coverage

      - name: Build
        id: build
        run: npm run build

      - name: Devflow self-check
        id: selfcheck
        run: node dist/main.js --version && node dist/main.js status --json 2>&1 || true

      # ── Summary ──

      - name: CI Summary
        if: always()
        run: |
          echo "## CI Results — Node ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ steps.typecheck.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ steps.coverage.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.build.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**All gates mandatory.** Only tools declared in devDependencies are used." >> $GITHUB_STEP_SUMMARY
