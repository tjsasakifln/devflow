name: CI — Devflow Harness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gates (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Deterministic Gates (ALL BLOCKING) ──

      - name: TypeScript type check
        id: typecheck
        run: npx tsc --noEmit

      - name: ESLint (constitution rules)
        id: lint
        run: npx eslint src/ --max-warnings 0 --config .devflow/eslintrc.constitution.json

      - name: Unit tests
        id: tests
        run: npx vitest run --reporter=verbose

      - name: Coverage (≥80%)
        id: coverage
        run: npx vitest run --coverage --reporter=verbose

      - name: Circular dependency check
        id: circular
        run: npx madge --circular --extensions ts src/

      - name: Forbidden dependency check
        id: forbidden
        run: |
          if [ -f .devflow/dependency-cruiser.constitution.js ]; then
            npx dependency-cruiser --config .devflow/dependency-cruiser.constitution.js src/
          else
            echo "dependency-cruiser config not found — using default"
            npx dependency-cruiser src/ --output-type err 2>&1 || true
          fi

      - name: TODO/FIXME audit
        id: todos
        run: |
          UNLINKED=$(grep -rn "TODO\|FIXME" src/ --include="*.ts" | grep -v "TODO(#" | grep -v "FIXME(#" || true)
          if [ -n "$UNLINKED" ]; then
            echo "❌ Unlinked TODO/FIXME found:"
            echo "$UNLINKED"
            exit 1
          else
            echo "✅ All TODO/FIXME have ticket references"
          fi

      - name: Build
        id: build
        run: npm run build

      - name: Adversarial test suite
        id: adversarial
        run: npx vitest run test/adversarial/ --reporter=verbose

      - name: Devflow self-check
        id: selfcheck
        run: |
          echo "Devflow status check..."
          node dist/main.js status --json 2>&1 || echo "Devflow self-check skipped (build required first)"

      - name: Package audit (advisory only)
        run: npm audit --audit-level=high
        continue-on-error: true

      # ── Summary ──

      - name: CI Summary
        if: always()
        run: |
          echo "## CI Results — Node ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ steps.typecheck.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ${{ steps.lint.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ steps.coverage.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Circular Deps | ${{ steps.circular.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Forbidden Deps | ${{ steps.forbidden.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TODO/FIXME | ${{ steps.todos.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.build.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Adversarial | ${{ steps.adversarial.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Principle:** CI is the source of truth — no continue-on-error for structural gates." >> $GITHUB_STEP_SUMMARY
