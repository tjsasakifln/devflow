name: 'Devflow PR Risk Report'
description: 'Audit AI-generated code changes and generate a PR risk report — local AI coding governance for Claude Code, Cursor, and Copilot'
author: 'Devflow'

inputs:
  risk-tolerance:
    description: 'Risk tolerance level (relaxed | moderate | strict)'
    required: false
    default: 'moderate'
  fail-on:
    description: 'Fail pipeline when findings at or above this severity (CRITICAL | HIGH | MEDIUM | LOW | never)'
    required: false
    default: 'HIGH'
  working-directory:
    description: 'Working directory for the audit'
    required: false
    default: '.'
  base-branch:
    description: 'Base branch to compare against'
    required: false
    default: 'main'
  output-file:
    description: 'Path for the generated report file'
    required: false
    default: 'devflow-report.md'

outputs:
  verdict:
    description: 'Audit verdict (PASS | WARN | FAIL | BLOCKED)'
    value: ${{ steps.audit.outputs.verdict }}
  json-report-path:
    description: 'Path to JSON report for machine consumption'
    value: ${{ steps.audit.outputs.report-path }}
  human-report-path:
    description: 'Path to human-readable markdown report'
    value: ${{ steps.audit.outputs.human-report-path }}
  critical-count:
    description: 'Number of CRITICAL findings'
    value: ${{ steps.audit.outputs.critical-count }}
  high-count:
    description: 'Number of HIGH findings'
    value: ${{ steps.audit.outputs.high-count }}
  medium-count:
    description: 'Number of MEDIUM findings'
    value: ${{ steps.audit.outputs.medium-count }}
  low-count:
    description: 'Number of LOW findings'
    value: ${{ steps.audit.outputs.low-count }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Devflow
      shell: bash
      run: npm install -g @tjsasakinpm/devflow

    - name: Run Devflow Audit
      id: audit
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Generate JSON report for reliable CI decision
        devflow review-pr \
          --base "origin/${{ inputs.base-branch }}" \
          --format json \
          --output /tmp/devflow-ci.json \
          --risk-tolerance "${{ inputs.risk-tolerance }}" \
          2>&1 || true

        # Extract severity counts reliably from JSON
        if [ -f /tmp/devflow-ci.json ]; then
          VERDICT=$(node -e "try{console.log(require('/tmp/devflow-ci.json').verdict||'UNKNOWN')}catch(e){console.log('UNKNOWN')}")
          CRITICAL=$(node -e "try{console.log(require('/tmp/devflow-ci.json').severityMatrix?.critical||0)}catch(e){console.log('0')}")
          HIGH=$(node -e "try{console.log(require('/tmp/devflow-ci.json').severityMatrix?.high||0)}catch(e){console.log('0')}")
          MEDIUM=$(node -e "try{console.log(require('/tmp/devflow-ci.json').severityMatrix?.medium||0)}catch(e){console.log('0')}")
          LOW=$(node -e "try{console.log(require('/tmp/devflow-ci.json').severityMatrix?.low||0)}catch(e){console.log('0')}")
        else
          VERDICT="ERROR"
          CRITICAL=0; HIGH=0; MEDIUM=0; LOW=0
        fi

        # Set outputs
        echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
        echo "report-path=/tmp/devflow-ci.json" >> $GITHUB_OUTPUT
        echo "human-report-path=${{ inputs.working-directory }}/${{ inputs.output-file }}" >> $GITHUB_OUTPUT
        echo "critical-count=$CRITICAL" >> $GITHUB_OUTPUT
        echo "high-count=$HIGH" >> $GITHUB_OUTPUT
        echo "medium-count=$MEDIUM" >> $GITHUB_OUTPUT
        echo "low-count=$LOW" >> $GITHUB_OUTPUT

        # Also generate human-readable markdown report
        devflow review-pr \
          --base "origin/${{ inputs.base-branch }}" \
          --format markdown \
          --output "${{ inputs.output-file }}" \
          --risk-tolerance "${{ inputs.risk-tolerance }}" \
          2>&1 || true

        # Post markdown to step summary
        if [ -f "${{ inputs.output-file }}" ]; then
          cat "${{ inputs.output-file }}" >> $GITHUB_STEP_SUMMARY
        fi

        # Fail pipeline based on fail-on threshold (reliable JSON-based)
        FAIL_SEVERITY="${{ inputs.fail-on }}"
        if [ "$FAIL_SEVERITY" = "never" ]; then
          echo "✅ fail-on=never — pipeline always passes"
          exit 0
        elif [ "$FAIL_SEVERITY" = "LOW" ] && [ $((CRITICAL + HIGH + MEDIUM + LOW)) -gt 0 ]; then
          echo "❌ Blocking: LOW or above findings detected"
          exit 1
        elif [ "$FAIL_SEVERITY" = "MEDIUM" ] && [ $((CRITICAL + HIGH + MEDIUM)) -gt 0 ]; then
          echo "❌ Blocking: MEDIUM or above findings detected (C:$CRITICAL H:$HIGH M:$MEDIUM)"
          exit 1
        elif [ "$FAIL_SEVERITY" = "HIGH" ] && [ $((CRITICAL + HIGH)) -gt 0 ]; then
          echo "❌ Blocking: HIGH or above findings detected (C:$CRITICAL H:$HIGH)"
          exit 1
        elif [ "$FAIL_SEVERITY" = "CRITICAL" ] && [ "$CRITICAL" -gt 0 ]; then
          echo "❌ Blocking: CRITICAL findings detected"
          exit 1
        else
          echo "✅ Pipeline passed fail-on=$FAIL_SEVERITY threshold"
          exit 0
        fi

    - name: Upload report artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: devflow-risk-report
        path: |
          ${{ inputs.working-directory }}/${{ inputs.output-file }}
          /tmp/devflow-ci.json
        retention-days: 30

branding:
  icon: 'shield'
  color: 'purple'
